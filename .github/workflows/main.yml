name: Download and Save Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Download Stream
        run: |
          ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
          -i "http://vod4k.cc:80/live/3143164151388361/9939196754/459404.ts" \
          -t 4800 -c copy max3put.ts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: recorded-video
          path: max3put.ts
          
