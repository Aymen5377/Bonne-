name: Ultimate 2-Hour Stream Recorder

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Record Stream (2 Hours)
        run: |
          # استخدام ffmpeg مباشرة مع ضبط التوقيت وإعادة الاتصال
          # -t 7200: تعني ساعتين (3600 ثانية * 2)
          # -user_agent: لمحاكاة متصفح عادي
          ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
          -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
          -i "http://9ntjn2.dynu.net/live/Alfonsocastilejo0316/pKXPKBKqpw/275111.m3u8" \
          -t 6000 -c copy -map 0 -y raw_stream.ts

      - name: Clean and Fix Timestamps
        run: |
          # التنظيف النهائي
          ffmpeg -i raw_stream.ts -c copy -fflags +genpts -bsf:v h264_mp4toannexb -f mpegts -y clean_video.ts

      - name: Store Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Recording-2Hours
          path: clean_video.ts
          
