name: Ultimate 2-Hour Stream Recorder

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install streamlink

      - name: Record Stream (2 Hours)
        run: |
          # التسجيل باستخدام streamlink لضمان الترتيب الدقيق للقطع
          # --hls-segment-threads: تضمن تحميل القطع بدون ضياع
          # --duration 7200: لساعتين كاملتين
          streamlink --hls-live-restart \
                     --hls-segment-threads 4 \
                     --hls-live-edge 3 \
                     --duration 7200 \
                     "hls://http://9ntjn2.dynu.net/live/Alfonsocastilejo0316/pKXPKBKqpw/275111.m3u8" \
                     best -o raw_stream.ts

      - name: Clean and Fix Timestamps
        run: |
          # التنظيف العميق: إعادة كتابة الملف لإصلاح أي قفزات زمنية (Glitches)
          # -fflags +genpts: يعيد بناء التوقيت لضمان عدم وجود رمش
          # -bsf:v h264_mp4toannexb: يضمن توافق الفيديو مع المعايير الدولية
          ffmpeg -i raw_stream.ts -c copy -fflags +genpts -bsf:v h264_mp4toannexb -f mpegts -y clean_video.ts

      - name: Store Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Recording-2Hours
          path: clean_video.ts
          retention-days: 1 # يمكنك تغيير عدد أيام الاحتفاظ بالملف
          
